databases:
  - name: watchtower-db
    databaseName: watchtower
    user: watchtower
    plan: free
    region: ohio

services:
  - type: web
    name: the-watchtower
    env: python
    plan: free
    region: ohio
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "bash start.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: watchtower-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: CELERY_BROKER_URL
        sync: false # User must input this manually from Upstash
      - key: CELERY_RESULT_BACKEND
        sync: false # User must input this manually from Upstash
      - key: ADMIN_USER
        sync: false # e.g. "admin"
      - key: ADMIN_EMAIL
        sync: false # e.g. "admin@example.com"
      - key: ADMIN_PASS
        sync: false # Superuser password

version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: watchtower
      POSTGRES_PASSWORD: watchtower_password
      POSTGRES_DB: watchtower_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: >
      bash -c "python manage.py migrate --noinput &&
               gunicorn --bind 0.0.0.0:8000 the_watchtower.wsgi:application"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://watchtower:watchtower_password@db:5432/watchtower_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery_worker:
    build: .
    command: celery -A the_watchtower worker --loglevel=info
    environment:
      - DATABASE_URL=postgres://watchtower:watchtower_password@db:5432/watchtower_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - redis

volumes:
  postgres_data:

{% extends "auth_base.html" %}
{% block title %}Verify OTP — The Watchtower{% endblock %}
{% block content %}
<div class="glass rounded-2xl p-8 sm:p-10 relative overflow-hidden text-center backdrop-blur-xl border border-amber-500/20">
    <div class="absolute top-0 left-0 right-0 h-[3px] bg-gradient-to-r from-transparent via-amber-400 to-transparent shadow-[0_0_15px_#fbbf24]"></div>

    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-amber-500/20 to-orange-600/30 border border-amber-500/30 text-amber-400 text-3xl mb-5 shadow-[0_0_25px_rgba(251,191,36,0.2)]">
        <i class="fas fa-shield-halved"></i>
    </div>

    <h2 class="text-2xl font-bold text-white tracking-widest mb-1">CHECKPOINT</h2>
    <p class="text-sm text-slate-400 mb-2 font-mono">2FA Token Required</p>
    <p class="text-xs text-slate-500 mb-8 opacity-80">Check your registered comms channel</p>

    <form method="POST" class="space-y-6">
        {% csrf_token %}

        <input type="text" name="otp" placeholder="_ _ _ _ _ _" required maxlength="6"
               class="w-full bg-[#0a1526]/60 border border-[#1a2744] hover:border-amber-400/30 focus:border-amber-400 focus:ring-1 focus:ring-amber-400/20
                      text-amber-400 rounded-xl px-4 py-5 outline-none transition-all text-center text-4xl font-mono tracking-[0.5em] placeholder-slate-700/50 shadow-[inset_0_0_15px_rgba(0,0,0,0.5)]">

        <button type="submit"
                class="w-full py-4 rounded-xl text-sm font-bold uppercase tracking-widest transition-all
                       bg-gradient-to-r from-amber-500/20 to-orange-600/20 border border-amber-500/40 text-white
                       hover:from-amber-500/40 hover:to-orange-600/40 hover:shadow-[0_0_25px_rgba(251,191,36,0.3)]
                       flex items-center justify-center gap-2">
            Verify Clearance
        </button>
    </form>

    <div class="mt-8 pt-6 border-t border-[#1a2744] flex items-center justify-center gap-4">
        <a href="{% url 'resend_otp' %}" class="text-sm text-amber-400 hover:text-white font-semibold transition-colors">
            <i class="fas fa-rotate-right mr-1"></i> Resend
        </a>
        <span class="text-slate-700">|</span>
        <a href="/" class="text-sm text-slate-400 hover:text-white transition-colors">
            <i class="fas fa-ban mr-1"></i> Abort
        </a>
    </div>
</div>
{% endblock %}
